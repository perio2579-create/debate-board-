<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>진짜 싸움터를 찾아라!</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React 및 Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 아이폰 터치 시 파란 박스(하이라이트) 제거 및 터치 반응 속도 개선 */
    button, div, span {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
  </style>
</head>
<body class="bg-slate-50 antialiased selection:bg-indigo-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const debates = [
      {
        id: 1,
        title: "학교 내 휴대폰 사용 허용",
        icon: "📱",
        color: "from-blue-400 to-indigo-500",
        pro: "학생의 자유권 및 소통의 권리",
        con: "몰입할 수 있는 면학 분위기 조성",
        answer: "학생의 자율권과 공동체의 학습 분위기가 대립하는 카드",
        wrong1: "폰으로 게임하면 꿀잼인지 아닌지 따지는 카드",
        wrong2: "최신 스마트폰 자랑하기와 구형 폰 놀리기로 싸우는 카드",
        explanation: "휴대폰 논제는 단순한 오락거리가 아니라, [학생의 자율권]과 학교라는 [공동체의 학습 분위기]라는 두 보물이 부딪히는 싸움터야!"
      },
      {
        id: 2,
        title: "학교 현장체험학습 확대",
        icon: "🚌",
        color: "from-green-400 to-emerald-500",
        pro: "교실 밖 현장 교육과 추억 쌓기",
        con: "학생들의 단체 안전 및 가정의 비용 부담 감소",
        answer: "다양한 교육 경험의 기회와 안전 관리 및 경제적 부담이 대립하는 카드",
        wrong1: "에버랜드가 재밌는지 롯데월드가 재밌는지 놀이공원을 고르는 카드",
        wrong2: "버스 탈 때 멀미약을 먹어야 하는지 마는지 따지는 카드",
        explanation: "현장체험학습 논제는 놀이공원 취향 싸움이 아니라, [다양한 교육 경험]이라는 가치와 [안전과 경제적 부담]이라는 두 보물이 부딪히는 싸움터야!"
      },
      {
        id: 3,
        title: "학교 내 CCTV 설치 확대",
        icon: "📷",
        color: "from-purple-400 to-pink-500",
        pro: "범죄 예방과 학교 안전 확보",
        con: "학생과 교사의 사생활 보호",
        answer: "모두의 안전과 범죄 예방, 개인의 사생활 및 인권 보호가 대립하는 카드",
        wrong1: "폰 카메라로 찍는 거랑 CCTV랑 뭐가 다른지 싸우는 카드",
        wrong2: "CCTV 화질이 좋은지 안 좋은지 따지는 카드",
        explanation: "CCTV 논제는 단순히 화질이나 기계 싸움이 아니라, [안전]이라는 가치와 [인권/사생활]이라는 두 보물이 부딪히는 싸움터야!"
      },
      {
        id: 4,
        title: "학교폭력 방관자 처벌",
        icon: "⚖️",
        color: "from-amber-400 to-red-500",
        pro: "폭력 묵인을 막아 피해자 구하기 (도덕적 책임)",
        con: "직접 가해자가 아닌 학생 보호 (형평성)",
        answer: "폭력을 묵인한 도덕적 의무와 직접 가해 여부에 따른 처벌 기준이 대립하는 카드",
        wrong1: "친구가 맞고 있을 때 불쌍한 마음이 드는지 안 드는지 감정 싸움 카드",
        wrong2: "학교폭력 신고 전화번호가 117인지 112인지 번호를 맞추는 카드",
        explanation: "방관자 처벌 논제는 단순한 감정이나 번호 외우기가 아니라, [도덕적 의무]와 [처벌의 형평성]이라는 두 보물이 부딪히는 싸움터야!"
      },
      {
        id: 5,
        title: "비행학생의 퇴학 조치",
        icon: "🏫",
        color: "from-cyan-400 to-blue-600",
        pro: "대다수 선량한 학생들의 안전과 학습권",
        con: "문제 학생을 끝까지 포용하는 교육권",
        answer: "대다수 학생의 학습권과 안전, 위기 학생의 교육받을 권리가 대립하는 카드",
        wrong1: "불량학생이 반성문을 10장 써야 하는지 20장 써야 하는지 벌칙 개수를 따지는 카드",
        wrong2: "선생님이 학생에게 화를 얼마나 많이 내셨는지 선생님의 감정을 따지는 카드",
        explanation: "퇴학 조치 논제는 단순한 벌칙 개수나 감정 싸움이 아니라, [대다수의 학습권]과 [위기 학생의 교육권]이라는 두 보물이 부딪히는 싸움터야!"
      }
    ];

    function App() {
      const [score, setScore] = useState(0);
      const [playedTopics, setPlayedTopics] = useState([]); 
      const [currentTopic, setCurrentTopic] = useState(null); 
      const [shuffledCards, setShuffledCards] = useState([]); 
      const [feedback, setFeedback] = useState(null); 
      const [isGameFinished, setIsGameFinished] = useState(false); 
      const [shake, setShake] = useState(false); 
      const [showConfetti, setShowConfetti] = useState(false); 

      const shuffleArray = (array) => {
        const newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
      };

      const handleSelectTopic = (topic) => {
        setCurrentTopic(topic);
        setFeedback(null);
        setShake(false);
        setShowConfetti(false);

        const cards = [
          { text: topic.answer, isCorrect: true },
          { text: topic.wrong1, isCorrect: false },
          { text: topic.wrong2, isCorrect: false }
        ];
        setShuffledCards(shuffleArray(cards));
      };

      const handleCardClick = (card) => {
        if (feedback && feedback.type === 'success') return;

        if (card.isCorrect) {
          setScore((prev) => prev + 10);
          setShowConfetti(true);
          setFeedback({
            type: 'success',
            message: `🎉 정답이야!!! (+10점 획득!)\n\n정확하게 찾았어! ${currentTopic.explanation}`
          });

          const newPlayedTopics = [...playedTopics, currentTopic.id];
          setPlayedTopics(newPlayedTopics);

          if (newPlayedTopics.length === debates.length) {
            setTimeout(() => setIsGameFinished(true), 4000); 
          }
        } else {
          setShake(true);
          setTimeout(() => setShake(false), 500);
          setFeedback({
            type: 'error',
            message: "🚫 아쉽지만 그건 진짜 싸움터가 아니야!\n단순히 감정적으로 싸우는 카드이거나 곁가지 의견일 수 있어.\n\n💡 힌트: 양 팀이 진짜로 지키려 하는 '무겁고 가치 있는 핵심 가치'가 대치하는 카드를 골라봐!"
          });
        }
      };

      const handleBackToMenu = () => {
        setCurrentTopic(null);
        setFeedback(null);
        setShake(false);
        setShowConfetti(false);
      };

      const restartGame = () => {
        setScore(0);
        setPlayedTopics([]);
        setCurrentTopic(null);
        setFeedback(null);
        setIsGameFinished(false);
        setShake(false);
        setShowConfetti(false);
      };

      return (
        <div className="min-h-screen bg-slate-50 py-4 px-3 font-sans text-gray-800 flex justify-center items-center">
          <style>{`
            @keyframes shake {
              0%, 100% { transform: translateX(0); }
              20%, 60% { transform: translateX(-6px); }
              40%, 80% { transform: translateX(6px); }
            }
            .shake-animation {
              animation: shake 0.4s ease-in-out;
            }
            @keyframes float-emoji {
              0% { transform: translateY(10px); opacity: 0; }
              50% { opacity: 1; }
              100% { transform: translateY(-80px) scale(1.5); opacity: 0; }
            }
            .confetti-particle {
              position: absolute;
              animation: float-emoji 1.5s ease-out forwards;
            }
          `}</style>

          <div className="max-w-md w-full bg-white rounded-3xl shadow-lg border border-slate-100 overflow-hidden relative">
            {/* 진행도 표시 바 */}
            <div className="w-full bg-slate-100 h-1.5 flex">
              {debates.map((topic) => (
                <div 
                  key={topic.id} 
                  className={`flex-1 h-full transition-all duration-500 ${
                    playedTopics.includes(topic.id) ? 'bg-indigo-500' : (currentTopic?.id === topic.id ? 'bg-amber-400' : 'bg-slate-200')
                  }`}
                />
              ))}
            </div>

            {/* 헤더 */}
            <div className="bg-gradient-to-r from-indigo-600 to-indigo-800 text-white p-5 text-center">
              <span className="inline-block bg-indigo-500 text-indigo-100 text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full mb-1">
                🏫 토론 쟁점 게임
              </span>
              <h1 className="text-xl md:text-2xl font-black tracking-tight">💥 진짜 싸움터를 찾아라!</h1>
              <p className="text-indigo-200 text-xs mt-0.5">양보 없는 핵심 가치의 충돌을 찾아내자!</p>
            </div>

            <div className="p-4 md:p-6">
              {isGameFinished ? (
                <div className="text-center py-6">
                  <div className="text-6xl mb-4 animate-bounce">🏆</div>
                  <h2 className="text-2xl font-black text-indigo-600 mb-1">대단해! 미션 완료!</h2>
                  <p className="text-slate-500 text-xs font-medium mb-6">진짜 쟁점을 구출하는 데 성공했어!</p>
                  
                  <div className="bg-indigo-50 p-5 rounded-2xl max-w-xs mx-auto mb-6 border border-indigo-100">
                    <p className="text-slate-600 text-xs font-semibold mb-1">최종 점수</p>
                    <p className="text-4xl font-black text-red-500">{score}<span className="text-xl text-slate-700"> / 50</span></p>
                  </div>

                  <button
                    onClick={restartGame}
                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 px-6 rounded-2xl shadow-md"
                  >
                    처음부터 다시 시작하기
                  </button>
                </div>
              ) : currentTopic ? (
                <div className={shake ? 'shake-animation' : ''}>
                  {showConfetti && (
                    <div className="absolute inset-0 pointer-events-none flex justify-center items-center overflow-hidden z-50">
                      <span className="confetti-particle text-3xl" style={{left: '25%', top: '40%'}}>🎉</span>
                      <span className="confetti-particle text-3xl" style={{left: '75%', top: '35%', animationDelay: '0.2s'}}>💎</span>
                      <span className="confetti-particle text-3xl" style={{left: '50%', top: '25%', animationDelay: '0.4s'}}>✨</span>
                    </div>
                  )}

                  <div className="flex justify-between items-center mb-4">
                    <button
                      onClick={handleBackToMenu}
                      className="text-slate-500 hover:text-indigo-600 font-bold text-xs flex items-center"
                    >
                      ◀ 목록으로
                    </button>
                    <div className="font-bold text-xs bg-indigo-50 text-indigo-700 py-1 px-3 rounded-full border border-indigo-150">
                      점수: {score}점
                    </div>
                  </div>

                  {/* 카드 타이틀 */}
                  <div className={`p-4 rounded-2xl text-center bg-gradient-to-br ${currentTopic.color} text-white shadow mb-4`}>
                    <span className="text-3xl mb-1 block">{currentTopic.icon}</span>
                    <h2 className="text-lg font-black">{currentTopic.title}</h2>
                  </div>

                  {/* 보물 맵 */}
                  <div className="grid grid-cols-2 gap-2 mb-4">
                    <div className="bg-sky-50/70 border border-sky-100 p-3 rounded-xl">
                      <div className="text-sky-600 font-black text-[10px] uppercase tracking-wider mb-1">
                        💙 찬성측 보물
                      </div>
                      <div className="text-slate-800 font-bold text-xs leading-snug">{currentTopic.pro}</div>
                    </div>
                    <div className="bg-rose-50/70 border border-rose-100 p-3 rounded-xl">
                      <div className="text-rose-600 font-black text-[10px] uppercase tracking-wider mb-1">
                        ❤️ 반대측 보물
                      </div>
                      <div className="text-slate-800 font-bold text-xs leading-snug">{currentTopic.con}</div>
                    </div>
                  </div>

                  <div className="text-center font-bold text-xs text-indigo-600 mb-4 bg-indigo-50/50 py-2.5 px-3 rounded-xl border border-dashed border-indigo-200">
                    ⚡ 진짜 싸움터(보물의 충돌) 카드를 골라봐!
                  </div>

                  {/* 보기 리스트 */}
                  <div className="space-y-2 mb-4">
                    {shuffledCards.map((card, index) => {
                      const isCorrectAnswer = feedback && feedback.type === 'success' && card.isCorrect;
                      return (
                        <button
                          key={index}
                          onClick={() => handleCardClick(card)}
                          className={`w-full text-left p-3.5 rounded-xl border transition-all duration-200 shadow-sm flex items-start gap-2.5 min-h-[54px]
                            ${isCorrectAnswer 
                              ? 'bg-emerald-50 border-emerald-500 text-emerald-900 font-bold' 
                              : 'bg-white border-slate-200 active:bg-slate-100'
                            }`}
                        >
                          <span className={`w-5 h-5 shrink-0 rounded-full flex items-center justify-center font-bold text-[10px] border mt-0.5 ${
                            isCorrectAnswer ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-slate-100 text-slate-500 border-slate-200'
                          }`}>
                            {index + 1}
                          </span>
                          <span className="text-xs md:text-sm leading-relaxed">{card.text}</span>
                        </button>
                      );
                    })}
                  </div>

                  {/* 결과 메시지 */}
                  {feedback && (
                    <div className={`p-4 rounded-xl font-medium text-xs transition-all duration-300 border shadow-inner ${
                      feedback.type === 'success' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' : 'bg-rose-50 text-rose-800 border-rose-200'
                    }`}>
                      <p className="leading-relaxed whitespace-pre-line">{feedback.message}</p>
                    </div>
                  )}

                  {feedback && feedback.type === 'success' && playedTopics.length < debates.length && (
                    <div className="mt-4">
                      <button
                        onClick={handleBackToMenu}
                        className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-extrabold py-3.5 rounded-xl text-xs"
                      >
                        다음 논제 도전하기 ➜
                      </button>
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  <div className="text-center mb-6">
                    <div className="inline-flex items-center gap-1.5 bg-amber-50 text-amber-800 font-extrabold text-sm py-1.5 px-4 rounded-full border border-amber-200">
                      <span>💎</span> 보물 수집 점수: {score} / 50점
                    </div>
                    <p className="text-slate-500 text-xs font-semibold mt-2.5 leading-relaxed">
                      각 주제를 터치해서 진짜 핵심 가치(보물)들이<br />충돌하고 있는 진짜 전장을 구출해 봐!
                    </p>
                  </div>

                  {/* 리스트 */}
                  <div className="grid gap-3">
                    {debates.map((topic) => {
                      const isPlayed = playedTopics.includes(topic.id);
                      return (
                        <button
                          key={topic.id}
                          onClick={() => handleSelectTopic(topic)}
                          disabled={isPlayed}
                          className={`p-3.5 rounded-2xl text-left border flex items-center justify-between transition-all duration-200 active:scale-[0.98]
                            ${isPlayed
                              ? 'bg-slate-50 border-slate-100 text-slate-400 opacity-65'
                              : 'bg-white border-slate-150 active:bg-slate-50 text-slate-800'}`}
                        >
                          <div className="flex items-center gap-3">
                            <span className="text-2xl">{topic.icon}</span>
                            <div>
                              <span className="text-[9px] font-bold text-slate-400 block">TOPIC {topic.id}</span>
                              <span className={`font-bold text-sm ${isPlayed ? 'line-through text-slate-400' : 'text-slate-800'}`}>
                                {topic.title}
                              </span>
                            </div>
                          </div>
                          {isPlayed ? (
                            <span className="bg-emerald-50 text-emerald-700 py-1 px-2.5 rounded-lg text-[10px] font-bold">✓ 완수</span>
                          ) : (
                            <span className="bg-indigo-50 text-indigo-600 py-1 px-2.5 rounded-lg text-[10px] font-bold">도전</span>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
