<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>명품도덕쌤과 토론 즐기기</title>
  <style>
    :root{--bg:#f7f4c8;--card:#fff;--main:#1e1b4b;--sub:#4f46e5;--line:#dbe4ff;--text:#111827;--muted:#5b6475;--blue:#2563eb;--red:#dc2626;--green:#16a34a}
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,var(--bg),#fffbe6);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:24px 16px 60px}
    header{background:white;border-radius:28px;padding:28px;box-shadow:0 10px 28px rgba(0,0,0,.08);margin-bottom:22px;text-align:center}
    h1{margin:0 0 10px;color:#3730a3;font-size:clamp(28px,5vw,42px)}
    .lead{margin:0;color:var(--muted);font-size:18px;line-height:1.6}
    .section{background:white;border-radius:26px;padding:24px;box-shadow:0 8px 24px rgba(0,0,0,.06);margin-top:18px}
    h2{margin:0 0 18px;color:#3730a3}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;align-items:stretch}
    .topic{border:2px solid var(--line);border-radius:20px;padding:22px 20px;background:white;cursor:pointer;text-align:left;transition:.15s;min-height:128px;width:100%}
    .topic:hover{transform:translateY(-2px);border-color:var(--sub);box-shadow:0 8px 18px rgba(79,70,229,.12)}
    .badge{display:inline-block;background:#fff0bf;color:#9a4b00;padding:7px 11px;border-radius:999px;font-weight:900;font-size:13px;margin-bottom:14px}
    .badge.custom-badge{background:#dcfce7;color:#166534}
    .topic-title{font-weight:950;font-size:22px;color:#0f172a;line-height:1.35}
    .topic-desc{color:var(--muted);line-height:1.5;font-size:14px;margin-top:8px}
    .custom-card{border-color:#86efac;background:#f4fff6}
    .custom-card:hover{border-color:#22c55e;box-shadow:0 8px 18px rgba(34,197,94,.16)}
    .hidden{display:none!important}
    .topbar{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
    .pill{display:inline-block;border-radius:999px;background:#eef2ff;color:#3730a3;padding:8px 13px;font-weight:900}
    .work-title{font-size:25px;font-weight:950;color:#111827;margin:14px 0}
    .hint{background:#eef2ff;border-left:6px solid var(--sub);border-radius:18px;padding:15px;line-height:1.65;color:#30335e}
    label{display:block;font-weight:900;margin:18px 0 8px;color:#20264a}
    textarea,input{width:100%;border:2px solid #dfe5f7;border-radius:16px;padding:14px 15px;font-size:16px;font-family:inherit;outline:none;background:white}
    textarea{min-height:88px;resize:vertical}
    textarea:focus,input:focus{border-color:var(--sub);box-shadow:0 0 0 4px rgba(79,70,229,.12)}
    .stance-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 18px}
    .stance{border:2px solid #e5e7eb;border-radius:18px;padding:16px;font-weight:950;font-size:18px;cursor:pointer;background:white;transition:.15s}
    .stance.pro{color:var(--blue);border-color:#bfdbfe;background:#eff6ff}.stance.con{color:var(--red);border-color:#fecaca;background:#fff1f2}
    .stance.pro.selected{background:#dbeafe;border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    .stance.con.selected{background:#fee2e2;border-color:var(--red);box-shadow:0 0 0 4px rgba(220,38,38,.12)}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    button.action{border:0;border-radius:999px;padding:14px 22px;font-weight:900;font-size:16px;cursor:pointer;background:var(--sub);color:white;box-shadow:0 8px 18px rgba(79,70,229,.25)}
    button.secondary{background:#eef2ff;color:#3730a3;box-shadow:none}
    .result{border:2px solid #c7f0ce;background:#eaffed;border-radius:22px;padding:20px;margin-top:20px;line-height:1.7}
    .box{background:white;border:1px solid #d9f5df;border-radius:18px;padding:15px;margin-top:12px}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:14px}.compare{background:#f9fafb;border:1px solid #e5e7eb;border-radius:18px;padding:14px}
    .small{font-size:14px;color:var(--muted);line-height:1.55}.issue{background:#fff7ed;border:2px solid #fed7aa!important}.tip{background:#fefce8;border:2px solid #fde68a!important}
    .tip-list{margin:8px 0 0 18px;padding:0}.tip-list li{margin:7px 0}.copy{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:14px;padding:12px;margin-top:10px;font-weight:800}
    .footer-note{text-align:center;color:#6b7280;margin-top:16px;font-size:13px}
    @media(max-width:720px){.grid,.two,.stance-row{grid-template-columns:1fr}.section{padding:18px}.wrap{padding:14px 10px 40px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>💎 명품도덕쌤과 토론 즐기기</h1>
      <p class="lead">입장과 이유를 먼저 정하고, 그 안에 숨어 있는 <b>찬성 보물</b>과 <b>반대 보물</b>을 찾아<br>🤖 AI 토론코치와 함께 진짜 쟁점을 정리합니다.</p>
    </header>

    <section id="home" class="section">
      <h2>🔥 필수 논제 5가지</h2>
      <div class="grid">
        <button class="topic" onclick="startTopic(1)"><span class="badge">필수 논제 1</span><div class="topic-title">학교 내 휴대폰 사용 허용</div><div class="topic-desc">학생의 자유와 학교의 학습 분위기가 충돌하는 논제</div></button>
        <button class="topic" onclick="startTopic(2)"><span class="badge">필수 논제 2</span><div class="topic-title">학교 현장체험학습 확대</div><div class="topic-desc">다양한 교육 경험과 안전·비용 부담이 충돌하는 논제</div></button>
        <button class="topic" onclick="startTopic(3)"><span class="badge">필수 논제 3</span><div class="topic-title">학교 내 CCTV 설치 확대</div><div class="topic-desc">학교 안전과 사생활·인권 보호가 충돌하는 논제</div></button>
        <button class="topic" onclick="startTopic(4)"><span class="badge">필수 논제 4</span><div class="topic-title">학교폭력 방관자 책임부과</div><div class="topic-desc">도덕적 책임과 어디까지 책임을 물을지 고민하는 논제</div></button>
        <button class="topic" onclick="startTopic(5)"><span class="badge">필수 논제 5</span><div class="topic-title">비행학생의 퇴학 조치</div><div class="topic-desc">다수 학생의 학습권·안전과 위기 학생의 교육권이 충돌하는 논제</div></button>
        <button class="topic custom-card" onclick="startCustomTopicPrompt()"><span class="badge custom-badge">자유 논제</span><div class="topic-title">+ 내가 생각한 논제로 쟁점 찾기</div><div class="topic-desc">자신의 말하고자 하는 논제 적기</div></button>
      </div>
    </section>

    <section id="work" class="section hidden">
      <div class="topbar">
        <button class="action secondary" onclick="goHome()">← 논제 목록으로</button>
        <span class="pill">입장 → 이유 → 보물 → 쟁점</span>
      </div>
      <div id="workTitle" class="work-title"></div>
      <div class="hint">먼저 자신의 입장과 이유를 정한 뒤, 그 생각 안에 숨어 있는 <b>가치·권리·책임·공동체의 이익</b>을 찾아보세요.</div>

      <label>1⃣ 나의 입장 선택</label>
      <div class="stance-row">
        <button id="proBtn" class="stance pro" onclick="selectStance('찬성')">👍 찬성</button>
        <button id="conBtn" class="stance con" onclick="selectStance('반대')">👎 반대</button>
      </div>

      <label for="reasonInput">2⃣ 왜 그렇게 생각했나요?</label>
      <textarea id="reasonInput" placeholder="예: 학생 안전을 위해 필요하다고 생각합니다."></textarea>

      <label for="proInput">3⃣ 학생이 찾은 찬성 보물</label>
      <textarea id="proInput" placeholder="예: 학생의 자유, 안전, 학습권, 책임감, 공동체 질서 등"></textarea>
      <label for="conInput">4⃣ 학생이 찾은 반대 보물</label>
      <textarea id="conInput" placeholder="예: 사생활, 선택권, 형평성, 교육 기회, 비용 부담 감소 등"></textarea>

      <div class="btns">
        <button class="action" onclick="showFeedback()">🤖 AI 토론코치 피드백 받기</button>
        <button class="action secondary" onclick="clearInputs()">다시 쓰기</button>
        <button class="action secondary" onclick="goHome()">논제 목록으로</button>
      </div>
      <div id="result" class="result hidden"></div>
    </section>

    <div class="footer-note">© 수업용 단일 HTML 웹앱</div>
  </div>

  <script>
    const topics = {
      1:{title:'학교 내 휴대폰 사용 허용',basicPro:'학생의 자유권 및 소통의 권리',basicCon:'몰입할 수 있는 면학 분위기 조성',coachPro:'학생이 스스로 판단하고 필요한 소통을 할 수 있는 자율성과 권리',coachCon:'모든 학생이 방해받지 않고 배울 수 있는 공동체의 학습 환경과 질서',issue:'학생의 자율성과 소통권을 위해 학교 내 휴대폰 사용을 허용해야 하는가, 아니면 공동체의 학습 분위기와 수업 몰입을 위해 제한해야 하는가?',tip:'휴대폰이 좋은지 나쁜지 묻는 것이 아니라, 개인의 자유와 공동체의 학습권 중 어떤 가치를 어떤 상황에서 더 우선할지 묻는 논제로 정리할 수 있어요.'},
      2:{title:'학교 현장체험학습 확대',basicPro:'교실 밖 현장 교육과 추억 쌓기',basicCon:'학생들의 단체 안전 및 가정의 비용 부담 감소',coachPro:'학생이 실제 경험을 통해 배우고 성장할 수 있는 다양한 교육 기회',coachCon:'학생 안전을 보장하고 가정의 경제적 부담을 줄여야 하는 학교의 책임',issue:'학생들에게 다양한 현장 교육 경험을 제공하기 위해 체험학습을 확대해야 하는가, 아니면 안전 문제와 비용 부담을 고려해 신중하게 제한해야 하는가?',tip:'놀이공원이 재미있는지를 따지는 것이 아니라, 교육적 경험의 가치와 안전·경제적 부담이라는 현실 조건이 충돌하는 지점을 찾아야 해요.'},
      3:{title:'학교 내 CCTV 설치 확대',basicPro:'범죄 예방과 학교 안전 확보',basicCon:'학생과 교사의 사생활 보호',coachPro:'학교 구성원이 폭력과 위험으로부터 보호받을 수 있는 안전권과 생명 보호',coachCon:'감시받지 않고 존중받으며 생활할 수 있는 사생활과 인권 보호',issue:'학교 안전과 범죄 예방을 위해 CCTV를 확대해야 하는가, 아니면 개인의 사생활과 인권 보호를 위해 제한해야 하는가?',tip:'CCTV 화질이나 개수만 따지는 것이 아니라, 안전을 위해 감시를 어디까지 허용할 수 있는지 묻는 가치 충돌로 정리해야 해요.'},
      4:{title:'학교폭력 방관자 책임부과',basicPro:'폭력 묵인을 막아 피해자 구하기, 도덕적 책임',basicCon:'직접 가해자가 아닌 학생 보호, 책임 부과의 신중함',coachPro:'피해자를 보호하고 폭력을 모른 척하지 않아야 하는 공동체 구성원의 도덕적 책임',coachCon:'직접 괴롭히지 않은 학생에게 어디까지 책임을 물을 수 있는지 따져야 하는 신중함',issue:'학교폭력을 막기 위해 방관자에게도 책임을 물어야 하는가, 아니면 직접 가해자가 아닌 학생에게까지 책임을 넓히는 것은 신중해야 하는가?',tip:'친구가 불쌍한지 아닌지가 아니라, 친구를 도와야 할 책임과 어디까지 책임을 물을 수 있는지를 묻는 쟁점으로 정리해야 해요.'},
      5:{title:'비행학생의 퇴학 조치',basicPro:'대다수 선량한 학생들의 안전과 학습권',basicCon:'문제 학생을 끝까지 포용하는 교육권',coachPro:'다수 학생이 안전하고 안정적인 환경에서 배울 수 있는 학습권과 공동체 보호',coachCon:'위기 학생도 변화하고 성장할 기회를 가져야 한다는 교육권과 회복적 정의',issue:'다수 학생의 안전한 학습 환경을 위해 비행학생을 퇴학시킬 수 있는가, 아니면 문제 학생도 교육 공동체 안에서 변화할 기회를 보장받아야 하는가?',tip:'벌을 얼마나 줄지의 문제가 아니라, 공동체 보호와 한 학생의 교육 기회 보장 사이의 균형을 묻는 논제로 정리해야 해요.'}
    };
    let currentTopic=null, selectedStance='';
    function startCustomTopicPrompt(){const title=prompt('내가 생각한 논제를 적어 주세요.\n예: 학교 급식에 채식을 늘려야 한다'); if(!title||!title.trim())return; currentTopic={id:'custom',title:title.trim()}; openWork('🎯 '+title.trim());}
    function startTopic(id){currentTopic={id,...topics[id]}; openWork('🎯 '+topics[id].title);}
    function openWork(title){document.getElementById('home').classList.add('hidden');document.getElementById('work').classList.remove('hidden');document.getElementById('workTitle').textContent=title;clearInputs();window.scrollTo({top:0,behavior:'smooth'});}
    function selectStance(stance){selectedStance=stance;document.getElementById('proBtn').classList.toggle('selected',stance==='찬성');document.getElementById('conBtn').classList.toggle('selected',stance==='반대');}
    function clearInputs(){selectedStance='';document.getElementById('proBtn').classList.remove('selected');document.getElementById('conBtn').classList.remove('selected');['proInput','conInput','reasonInput'].forEach(id=>document.getElementById(id).value='');document.getElementById('result').classList.add('hidden');document.getElementById('result').innerHTML='';}
    function showFeedback(){const pro=val('proInput'), con=val('conInput'), reason=val('reasonInput'); if(!selectedStance){alert('찬성 또는 반대 입장을 먼저 선택해 주세요.');return;} if(!reason){alert('왜 그렇게 생각했는지 이유를 먼저 적어 주세요.');return;} if(!pro||!con){alert('찬성 보물과 반대 보물을 모두 적어 주세요.');return;} const isCustom=currentTopic.id==='custom'; let coachPro,coachCon,issue,tip,basicPro,basicCon; if(isCustom){coachPro=enrichValue(pro,'찬성');coachCon=enrichValue(con,'반대');issue=`${currentTopic.title}라는 논제에서, ${coachPro}을/를 우선해야 하는가, 아니면 ${coachCon}을/를 더 신중하게 고려해야 하는가?`;tip='자유 논제에서는 내가 쓴 이유 뒤에 숨어 있는 권리·책임·공정성·안전·자유 같은 더 큰 가치를 찾아야 쟁점이 깊어져요.';} else {coachPro=currentTopic.coachPro;coachCon=currentTopic.coachCon;issue=currentTopic.issue;tip=currentTopic.tip;basicPro=currentTopic.basicPro;basicCon=currentTopic.basicCon;} const result=document.getElementById('result'); result.innerHTML=`<h3>🤖 AI 토론코치 피드백</h3><div class="box"><b>🙋 나의 입장과 이유</b><br><b>${esc(selectedStance)}</b> — ${esc(reason)}</div><div class="two"><div class="compare"><b>학생이 찾은 찬성 보물</b><br>${esc(pro)}</div><div class="compare"><b>학생이 찾은 반대 보물</b><br>${esc(con)}</div></div><div class="box"><b>🔎 AI 토론코치가 보는 찬성 측 핵심 가치</b><br>${esc(coachPro)}<br><span class="small">${esc(compareStudentValue(pro))}</span></div><div class="box"><b>🔎 AI 토론코치가 보는 반대 측 핵심 가치</b><br>${esc(coachCon)}<br><span class="small">${esc(compareStudentValue(con))}</span></div>${!isCustom?`<div class="two"><div class="compare"><b>기본 찬성 보물</b><br>${esc(basicPro)}</div><div class="compare"><b>기본 반대 보물</b><br>${esc(basicCon)}</div></div>`:''}<div class="box issue"><b>🔥 AI 토론코치가 정리한 진짜 쟁점</b><br>${esc(issue)}</div><div class="box"><b>👍 한 줄 피드백</b><br>${esc(tip)}</div><div class="box tip"><b>🧭 쟁점을 한 번 더 상세하게 정리하는 팁</b><ul class="tip-list"><li><b>1. 가치 충돌로 바꾸기</b><br>무엇과 무엇이 충돌하는지 적어 보세요.</li><li><b>2. 두 가치 앞에 ‘누구의’를 붙이기</b><br>예: 학생의 자유, 피해자의 안전, 다수 학생의 학습권</li><li><b>3. 조건을 넣어 깊게 만들기</b><br>“어디까지”, “어떤 상황에서”를 넣으면 쟁점이 선명해집니다.</li><li><b>4. 질문형으로 정리하기</b><br>좋은 쟁점은 양쪽이 모두 주장할 수 있는 질문입니다.</li></ul><div class="copy">정리 공식: “${esc(coachPro)}을/를 위해 ○○해야 하는가, 아니면 ${esc(coachCon)}을/를 위해 제한하거나 신중해야 하는가?”</div></div>`; result.classList.remove('hidden');result.scrollIntoView({behavior:'smooth',block:'start'});}
    function enrichValue(text,side){const raw=text.toLowerCase(), has=(...w)=>w.some(x=>raw.includes(x)); if(has('자유','선택','자율'))return'개인이 스스로 선택하고 판단할 수 있는 자유와 자율성'; if(has('안전','보호','생명','폭력','범죄'))return'공동체 구성원을 위험으로부터 보호해야 하는 안전권과 생명 보호'; if(has('학습','공부','수업','교육'))return'학생이 안정적인 환경에서 배우고 성장할 수 있는 학습권과 교육 기회'; if(has('사생활','인권','개인정보','감시'))return'개인이 존중받고 과도한 감시를 받지 않을 사생활과 인권'; if(has('공정','형평','평등','차별'))return'모든 사람에게 기준이 공정하게 적용되어야 한다는 형평성과 평등'; if(has('비용','돈','부담','경제'))return'가정과 개인에게 지나친 경제적 부담을 주지 않아야 한다는 현실적 책임'; if(has('환경','자연','기후','쓰레기'))return'미래 세대와 공동체를 위한 환경 보호와 지속 가능성'; if(has('책임','의무','규칙','질서'))return'공동체가 함께 지켜야 할 책임, 규칙, 질서'; if(has('회복','포용','기회','성장','반성'))return'실수한 사람도 변화하고 성장할 수 있도록 돕는 포용과 회복의 가치'; return`${side} 측이 지키려는 '${text}'을/를 더 큰 가치로 보면, 이 논제에서 보호하려는 중요한 권리와 공동체의 이익`;}
    function compareStudentValue(s){return (s.length<8?'조금 더 구체적으로 표현하면 좋아요. ':'')+'입력한 보물을 더 넓게 보면 위와 같은 핵심 가치로 정리할 수 있습니다.';}
    function goHome(){document.getElementById('work').classList.add('hidden');document.getElementById('home').classList.remove('hidden');document.getElementById('result').classList.add('hidden');window.scrollTo({top:0,behavior:'smooth'});} function val(id){return document.getElementById(id).value.trim();} function esc(str){return String(str??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));}
  </script>
