<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토론 브레인스토밍: 3단계 포스트잇 보드</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        :root {
            --bg-color: #f4f6f9;
            --step1-color: #fff9c4;
            --step2-color: #ffcdd2;
            --step3-color: #c8e6c9;
        }
        body {
            font-family: 'Nanum Gothic', Arial, sans-serif;
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            flex-shrink: 0;
            z-index: 100;
        }
        h1 { margin: 0; font-size: 1.3rem; }
        select {
            padding: 7px 10px;
            font-size: 0.95rem;
            border-radius: 5px;
            border: none;
            outline: none;
            font-weight: bold;
            max-width: 320px;
        }
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: #34495e;
            color: white;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.15);
            overflow-y: auto;
            z-index: 50;
        }
        .step-info {
            background-color: rgba(255,255,255,0.1);
            padding: 10px 12px;
            border-radius: 6px;
            border-left: 5px solid #fff;
        }
        .step-info h3 { margin: 0 0 4px 0; font-size: 0.95rem; }
        .step-info p  { margin: 0; font-size: 0.8rem; color: #ccc; line-height: 1.4; }
        .step1-info { border-left-color: #f1c40f; }
        .step2-info { border-left-color: #e74c3c; }
        .step3-info { border-left-color: #2ecc71; }

        .btn-spawn {
            padding: 11px;
            font-size: 0.95rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: #2c3e50;
        }
        .btn-spawn:hover { opacity: 0.85; }
        #btn-s1 { background-color: #fff59d; }
        #btn-s2 { background-color: #ef9a9a; }
        #btn-s3 { background-color: #a5d6a7; }

        .btn-save-board {
            margin-top: auto;
            background-color: #e67e22;
            color: white;
            padding: 13px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-save-board:hover { background-color: #d35400; }

        /* ────── 보드 ────── */
        .board {
            flex: 1;
            position: relative;          /* ← absolute 포스트잇의 기준점 */
            background-image: radial-gradient(#bdc3c7 1px, transparent 1px);
            background-size: 20px 20px;
            background-color: var(--bg-color);
            overflow: hidden;            /* ← auto → hidden: 스크롤바 없앰 (드래그 오차 방지) */
            min-height: 0;
        }

        /* ────── 포스트잇 ────── */
        .sticky-note {
            position: absolute;
            width: 200px;
            height: 200px;
            min-width: 120px;
            min-height: 120px;
            padding: 10px 10px 6px 10px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            /* transition 제거 → 깃허브에서도 드래그 충돌 없음 */
            user-select: none;
            overflow: visible;
        }
        .sticky-note textarea {
            flex: 1;
            width: 100%;
            border: none;
            background: transparent;
            resize: none;               /* 기본 resize 끔 → 커스텀 핸들 사용 */
            outline: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: bold;
            color: #333;
            line-height: 1.45;
            cursor: text;
            user-select: text;
            margin-top: 4px;
        }
        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.72rem;
            color: #555;
            font-weight: bold;
            cursor: move;               /* 헤더 영역만 드래그 커서 */
            flex-shrink: 0;
        }
        .btn-delete {
            cursor: pointer;
            font-size: 0.85rem;
            line-height: 1;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .btn-delete:hover { background: rgba(0,0,0,0.1); }

        .s1-note { background-color: var(--step1-color); border-top: 5px solid #f1c40f; }
        .s2-note { background-color: var(--step2-color); border-top: 5px solid #e74c3c; }
        .s3-note { background-color: var(--step3-color); border-top: 5px solid #2ecc71; }

        /* ────── 리사이즈 핸들 (오른쪽 하단 삼각형) ────── */
        .resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 18px;
            height: 18px;
            cursor: nwse-resize;
            background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.18) 50%);
            border-radius: 0 0 2px 0;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>💥 3단계 포스트잇 브레인스토밍 보드 💥</h1>
    <div>
        <label for="topic-select" style="color:white;font-weight:bold;margin-right:10px;">토론 논제 선택:</label>
        <select id="topic-select">
            <option>1. 학교 내 휴대폰 사용을 허용해야 한다.</option>
            <option>2. 학교는 현장체험학습을 확대해야 한다.</option>
            <option>3. 학교는 CCTV 설치를 확대해야 한다.</option>
            <option>4. 학교폭력 방관자도 책임을 져야 한다.</option>
            <option>5. 비행학생의 퇴학조치는 바람직하다.</option>
        </select>
    </div>
</header>

<div class="main-container">
    <div class="sidebar">
        <div class="step-info step1-info">
            <h3>1단계: 나의 주장</h3>
            <p>찬성/반대 입장을 선택하고 이유와 근거를 적으세요.</p>
        </div>
        <button class="btn-spawn" id="btn-s1">+ 주장 포스트잇 생성</button>

        <div class="step-info step2-info">
            <h3>2단계: 심술쟁이 태클</h3>
            <p>형평성 / 부작용 / 비용증가 / 자율성침해 / 효과부족 으로 태클을 거세요.</p>
        </div>
        <button class="btn-spawn" id="btn-s2">+ 태클 포스트잇 생성</button>

        <div class="step-info step3-info">
            <h3>3단계: 방어 및 재반박</h3>
            <p>상대방 태클 밑에 철벽 방어하는 재반박 문장을 완성하세요.</p>
        </div>
        <button class="btn-spawn" id="btn-s3">+ 재반박 포스트잇 생성</button>

        <button class="btn-save-board" id="btn-save">📸 활동 보드 저장하기</button>
    </div>

    <div class="board" id="board"></div>
</div>

<script>
    const board = document.getElementById('board');

    /* ── 포스트잇 생성 ── */
    document.getElementById('btn-s1').addEventListener('click', () => createNote('s1'));
    document.getElementById('btn-s2').addEventListener('click', () => createNote('s2'));
    document.getElementById('btn-s3').addEventListener('click', () => createNote('s3'));

    document.getElementById('topic-select').addEventListener('change', () => {
        if (confirm("논제를 변경하면 보드가 초기화됩니다. 변경하시겠습니까?")) {
            board.innerHTML = '';
        }
    });

    document.getElementById('btn-save').addEventListener('click', () => {
        if (board.children.length === 0) { alert("보드에 포스트잇이 없습니다!"); return; }
        html2canvas(board, { useCORS: true, scale: 2 }).then(canvas => {
            const link = document.createElement('a');
            link.download = '토론활동_브레인스토밍.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    });

    function createNote(type) {
        const note = document.createElement('div');
        note.classList.add('sticky-note');

        let label, placeholder;
        if (type === 's1') {
            note.classList.add('s1-note');
            label = '📢 1단계: 나의 주장';
            placeholder = '[입장] 찬성 / 반대\n\n주장과 이유·근거를 적어줘!';
        } else if (type === 's2') {
            note.classList.add('s2-note');
            label = '🔥 2단계: 반론 태클';
            placeholder = '[태클 힌트]\n- 형평성 문제\n- 부작용\n- 비용 증가\n- 자율성 침해\n- 효과 부족';
        } else {
            note.classList.add('s3-note');
            label = '🛡️ 3단계: 재반박';
            placeholder = '태클을 무력화할\n방어 문장 작성!';
        }

        /* 보드 안쪽 랜덤 위치 */
        const bw = board.clientWidth  || 600;
        const bh = board.clientHeight || 400;
        const x = Math.floor(Math.random() * Math.max(bw - 220, 10) + 10);
        const y = Math.floor(Math.random() * Math.max(bh - 220, 10) + 10);

        note.style.left = x + 'px';
        note.style.top  = y + 'px';

        note.innerHTML = `
            <div class="note-header">
                <span>${label}</span>
                <span class="btn-delete">❌</span>
            </div>
            <textarea placeholder="${placeholder}"></textarea>
            <div class="resize-handle"></div>
        `;

        /* 삭제 버튼 */
        note.querySelector('.btn-delete').addEventListener('click', () => note.remove());

        /* 드래그 & 리사이즈 연결 */
        makeDraggable(note);
        makeResizable(note, note.querySelector('.resize-handle'));

        board.appendChild(note);
    }

    /* ── 드래그 (보드 기준 좌표) ── */
    function makeDraggable(el) {
        const header = el.querySelector('.note-header');
        let startX, startY, startLeft, startTop;

        header.addEventListener('mousedown', onMouseDown);

        function onMouseDown(e) {
            /* textarea·삭제버튼 클릭은 통과 */
            if (e.target.tagName === 'TEXTAREA' ||
                e.target.classList.contains('btn-delete') ||
                e.target.classList.contains('resize-handle')) return;

            e.preventDefault();
            const rect = board.getBoundingClientRect();
            startX    = e.clientX - rect.left;
            startY    = e.clientY - rect.top;
            startLeft = parseInt(el.style.left) || 0;
            startTop  = parseInt(el.style.top)  || 0;

            el.style.zIndex = zTop++;

            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup',   onMouseUp);
        }

        function onMouseMove(e) {
            const rect = board.getBoundingClientRect();
            const cx = e.clientX - rect.left;
            const cy = e.clientY - rect.top;
            el.style.left = (startLeft + cx - startX) + 'px';
            el.style.top  = (startTop  + cy - startY) + 'px';
        }

        function onMouseUp() {
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup',   onMouseUp);
        }
    }

    /* ── 리사이즈 ── */
    function makeResizable(el, handle) {
        let startX, startY, startW, startH;

        handle.addEventListener('mousedown', e => {
            e.preventDefault();
            e.stopPropagation();
            startX = e.clientX;
            startY = e.clientY;
            startW = el.offsetWidth;
            startH = el.offsetHeight;

            el.style.zIndex = zTop++;

            document.addEventListener('mousemove', onResize);
            document.addEventListener('mouseup',   stopResize);
        });

        function onResize(e) {
            const nw = Math.max(120, startW + e.clientX - startX);
            const nh = Math.max(120, startH + e.clientY - startY);
            el.style.width  = nw + 'px';
            el.style.height = nh + 'px';
        }

        function stopResize() {
            document.removeEventListener('mousemove', onResize);
            document.removeEventListener('mouseup',   stopResize);
        }
    }

    let zTop = 10; /* 클릭한 포스트잇이 맨 앞으로 */
</script>
</body>
</html>
